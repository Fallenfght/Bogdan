<!DOCTYPE html><html lang="ru"><head>	<meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link type="image/x-icon" href="img/favicon/favicon.ico" rel="shortcut icon"><link type="Image/x-icon" href="img/favicon/favicon.ico" rel="icon">	<link rel="preconnect" href="https://fonts.googleapis.com">	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>	<link href="https://fonts.googleapis.com/css2?family=Stalinist+One&display=swap" rel="stylesheet">	<link rel="stylesheet" href="css/style.min.css">	<link rel="stylesheet" href="css/custom.css">	<title>Sapper</title></head><body>	<main class="main">		<div class="container">			<h1 class="main__head">Sapper</h1>		</div>		<div class="main__game game">			<div class="container">				<div class="game__inputs ">					<div class="game__input game__input-rows">						<label for="input1">Введите количество строк:</label>						<input type="number" name="" id="input1" value="16">					</div>					<div class="game__input game__input-cells">						<label for="input2">Введите ячеек в строке:</label>						<input type="number" name="" id="input2" value="16">					</div>					<div class="game__input game__input-bombs">						<label for="input3">Введите количество мин:</label>						<input type="number" name="" id="input3" value="40">					</div>					<button class="button button-start">Start</button>					<div class="game__bombs-remain"><span class="game__bombs-remain-text">Бомб осталось:</span><span class="game__bombs-remain-num">7</span></div>				</div>			</div>			<div class="game__container">			</div>		</div>	</main>	<script src="js/script.js"></script></body></html>
