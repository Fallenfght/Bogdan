<!DOCTYPE html><html lang="ru"><head>	<meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link type="image/x-icon" href="img/favicon/favicon.ico" rel="shortcut icon"><link type="Image/x-icon" href="img/favicon/favicon.ico" rel="icon">	<link rel="preconnect" href="https://fonts.googleapis.com">	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>	<link href="https://fonts.googleapis.com/css2?family=Stalinist+One&display=swap" rel="stylesheet">	<link rel="stylesheet" href="css/style.min.css">	<link rel="stylesheet" href="css/custom.css">	<title>Sapper</title></head><body>	<main class="main">		<div class="container">			<h1 class="main__head">Sapper</h1>		</div>		<div class="main__game game">			<div class="container">				<div class="game__inputs ">					<div class="game__input game__input-rows">						<label for="input1">Введите количество строк:</label>						<input type="text" name="" id="input1" value="9">					</div>					<div class="game__input game__input-cells">						<label for="input2">Введите количество ячеек в строке:</label>						<input type="text" name="" id="input2" value="9">					</div>					<div class="game__input game__input-bombs">						<label for="input3">Введите количество мин:</label>						<input type="text" name="" id="input3" value="10">					</div>					<div class="game__difficulties difficulties">						<div class="difficulties__container">							<div class="difficulties__item difficulties__noob _active">								<div class="difficulties__item-img">									<svg width="27" height="24" viewBox="0 0 27 24" fill="none" xmlns="http://www.w3.org/2000/svg">										<path											d="M20.1977 14.5819L19.7357 10.323H23.4817L25.3337 4.57093L20.3335 7.65772C18.8091 7.33705 14.2768 2.35022 13.2681 1.48413C12.2694 2.36938 8.07106 7.33534 6.33844 7.65772L1.25672 4.57093L2.83286 10.323H6.80042L6.33844 14.5819C6.61163 15.9506 7.40818 16.6893 8.71675 17.8944L13.2681 22.4743L18.0589 17.8944C18.995 16.7526 19.9916 16.1177 20.1977 14.5819Z"											fill="#656565" fill-opacity="0.87" stroke="black" stroke-opacity="0.78" stroke-width="0.864303" />										<path											d="M10.7974 10.2559L13.5606 7.76149L16.2713 10.2528L16.7427 13.7442L13.2144 15.0153L9.98942 13.7482L10.7974 10.2559Z"											fill="#7B5F4A" stroke="black" stroke-width="0.153441" />									</svg>								</div>								<div class="difficulties__item-container">									<p class="difficulties__item-text">Строк: 9</p>									<p class="difficulties__item-text">Ячеек: 9</p>									<p class="difficulties__item-text">Бомб: 10</p>								</div>								<p class="difficulties__item-name">Новичок</p>							</div>							<button class="difficulties__item button button_difficult difficulties__easy">Любитель</button>							<button class="difficulties__item button button_difficult difficulties__addvanced">Продвинутый</button>							<button class="difficulties__item button button_difficult difficulties__genius">Гений</button>							<button class="difficulties__item button button_difficult difficulties__alien">Сверхчеловек</button>							<button class="difficulties__item button button_difficult difficulties__custom">Свои настройки</button>						</div>					</div>					<button class="button button-start">Start</button>				</div>			</div>			<div class="game__container">			</div>		</div>	</main>	<script src="js/script.js"></script></body></html>
